---
name: pre-commit autoupdate

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push pre-commit hook updates
      pull-requests: write  # Required to create PR with autoupdate results

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure Python availability
        run: uv python install 3.11

      - name: Install pre-commit
        run: uv tool install pre-commit

      - name: Run pre-commit autoupdate
        run: uv run pre-commit autoupdate

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B chore/pre-commit-autoupdate
          git add -A
          git commit -m "chore: pre-commit autoupdate"
          git push --force origin chore/pre-commit-autoupdate
          gh pr create \
            --title "chore: pre-commit autoupdate" \
            --body "$(printf '## Summary\n- automatically run pre-commit autoupdate\n- keep hook revisions current')" \
            --base main \
            --head chore/pre-commit-autoupdate || echo "PR already exists"
